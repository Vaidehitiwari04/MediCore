services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: "04102005"
      MYSQL_DATABASE: "hospital"
    volumes:
      - mysql_data:/var/lib/mysql
    # Only bind to localhost for security, or rely on internal network. We map 3306 locally.
    ports:
      - "127.0.0.1:3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p04102005"]
      timeout: 10s
      retries: 5
      interval: 10s

  backend:
    build:
      context: ./hospital/hospital
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/hospital?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=04102005
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./hospital-frontend/hospital-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  mysql_data:
