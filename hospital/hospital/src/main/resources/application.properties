# Database - uses environment variables on Render, localhost for local dev
spring.datasource.url=${JDBC_DATABASE_URL:jdbc:postgresql://localhost:5432/hospital}
spring.datasource.username=${JDBC_DATABASE_USERNAME:root}
spring.datasource.password=${JDBC_DATABASE_PASSWORD:04102005}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect